image: mcr.microsoft.com/playwright:v1.61.0-jammy

variables:
  NODE_ENV: test
  PLAYWRIGHT_BROWSERS_PATH: 0

stages:
  - install
  - test
  - report

install:
  stage: install
  script:
    - npm ci
    - npx playwright install --with-deps chromium
  artifacts:
    paths:
      - node_modules
    expire_in: 1 day

test:chromium:
  stage: test
  script:
    - npm run test:chromium
  artifacts:
    when: always
    reports:
      html: playwright-report/index.html
    paths:
      - playwright-report/
      - test-results/
    expire_in: 7 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

test:all-browsers:
  stage: test
  script:
    - npm test
  artifacts:
    when: always
    reports:
      html: playwright-report/index.html
    paths:
      - playwright-report/
      - test-results/
    expire_in: 7 days
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual

generate-report:
  stage: report
  script:
    - echo "Test report generated at playwright-report/index.html"
  artifacts:
    paths:
      - playwright-report/
    expire_in: 30 days
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  dependencies:
    - test:all-browsers